spring:
  application:
    name: fluentbase-user-api

  datasource:
    url: jdbc:postgresql://localhost:5432/fluentbase_users
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8081

jwt:
  secret: your-256-bit-secret-key-change-this-in-production-minimum-32-chars
  access-token-expiration: 900000      # 15 minutes in ms
  refresh-token-expiration: 604800000  # 7 days in ms
